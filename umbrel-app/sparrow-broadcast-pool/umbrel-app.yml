manifestVersion: 1
id: sparrow-broadcast-pool
category: bitcoin
name: Broadcast Pool
version: "0.3.16"
tagline: Programa y difunde transacciones Bitcoin desde Sparrow con privacidad
icon: https://raw.githubusercontent.com/criptoworld8484/umbrel-apps/master/sparrow-broadcast-pool/icon.png
description: >-
  Broadcast Pool retiene transacciones firmadas en Sparrow Wallet y las difunde
  a la red en el momento que elijas: inmediato, por fecha/hora o por altura de
  bloque.


  Incluye un servidor Electrum integrado para que Sparrow se conecte a tu nodo
  Umbrel sin usar indexadores externos. Las transacciones permanecen en un
  mempool virtual local hasta que el scheduler las emite.


  Características:

  - Modos de envío: inmediato, programado (reloj) y por bloque

  - Reprogramación si el MTP de cadena retrasa la emisión

  - Dashboard web para monitorizar el pool

  - Soporte mainnet, testnet4 y signet (según red del nodo Bitcoin)

  - Conexión automática a Bitcoin Core y Electrs de Umbrel


  Configura Sparrow con la URL Electrum que muestra el dashboard (puerto 50050).
releaseNotes: >-
  v0.3.2 — Fix Sparrow connect hang (accept thread + no sync I/O on tokio workers).

  Dedicated OS thread for TCP accept; broadcast ingest fully async; removed sync electrs enrich on worker threads

  v0.3.1 — pre-ingest ack + session get_history fallback at height 0
